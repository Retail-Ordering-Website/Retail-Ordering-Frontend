<div class="category-container">
  <div class="category-header">
    <h1>Categories</h1>
    <p>Browse products by category</p>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading categories...</p>
  </div>

  <div *ngIf="error" class="error-state">
    <p>{{ error }}</p>
    <button class="btn btn-primary" (click)="fetchCategories()">Retry</button>
  </div>

  <div *ngIf="!isLoading && !error" class="category-content">
    
    <!-- Admin: Create Category -->
    <div *ngIf="isAdmin" class="create-card">
      <h3><i class="fas fa-plus-circle"></i> Create New Category</h3>
      
      <div *ngIf="createMessage" class="alert alert-success">{{ createMessage }}</div>
      <div *ngIf="createError" class="alert alert-danger">{{ createError }}</div>

      <form (ngSubmit)="onCreate()" #createForm="ngForm" class="create-form">
        <div class="form-row">
          <div class="form-group col-4">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="newCategory.name" required class="form-control" placeholder="Category Name" />
          </div>
          <div class="form-group col-8">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" [(ngModel)]="newCategory.description" class="form-control" placeholder="Brief description..." />
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-2" [disabled]="!createForm.valid || isCreating">
          <span *ngIf="isCreating" class="btn-spinner"></span>
          <span *ngIf="!isCreating">Add Category</span>
        </button>
      </form>
    </div>

    <!-- Category Grid -->
    <div class="category-grid">
      <div *ngFor="let cat of categories" class="category-card" [routerLink]="['/products/search']" [queryParams]="{categoryId: cat.id}">
        <div class="category-icon">
          <i class="fas fa-tags"></i>
        </div>
        <div class="category-details">
          <h3>{{ cat.name }}</h3>
          <p>{{ cat.description || 'No description available.' }}</p>
        </div>
        <div class="category-action">
          <i class="fas fa-chevron-right"></i>
        </div>
      </div>
    </div>

    <div *ngIf="categories.length === 0" class="no-data">
      <i class="fas fa-folder-open empty-icon"></i>
      <h3>No Categories Found</h3>
      <p>There are currently no product categories available.</p>
    </div>
  </div>
</div>
